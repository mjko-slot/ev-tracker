window.storage = {
  get: function(key) {
    try { var v = localStorage.getItem(key); return Promise.resolve(v === null ? null : { key: key, value: v }); }
    catch(e) { return Promise.resolve(null); }
  },
  set: function(key, value) {
    try { localStorage.setItem(key, value); } catch(e) {}
    return Promise.resolve({ key: key, value: value });
  },
  delete: function(key) {
    try { localStorage.removeItem(key); } catch(e) {}
    return Promise.resolve({ key: key, deleted: true });
  },
  list: function(prefix) {
    prefix = prefix || "";
    var keys = [];
    try { for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k && k.indexOf(prefix) === 0) keys.push(k); } } catch(e) {}
    return Promise.resolve({ keys: keys, prefix: prefix });
  }
};
